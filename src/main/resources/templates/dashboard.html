<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>HR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #chatIcon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #0d6efd;
            color: white;
            font-size: 22px;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
        }

        #chatContainer {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 320px;
            display: none;
        }

        #chatBox div {
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

<div class="d-flex">

    <div class="sidebar bg-dark text-white p-3">
        <h4>HR Panel</h4>
    </div>

    <div class="container-fluid p-4">

        <h2>HR Hiring Dashboard</h2>

        <!-- Upload -->
        <div class="card p-3 mt-3">
            <input type="file" id="files" multiple class="form-control"/>
            <button class="btn btn-primary mt-2" onclick="uploadFiles()">Upload</button>
        </div>

        <!-- Filter -->
        <div class="card p-3 mt-3">
            <h5>Job Description</h5>
            <textarea id="jd" class="form-control" rows="5"></textarea>

            <div class="mt-2 d-flex align-items-center gap-2">
                <label for="topN" class="mb-0">Top N Candidates:</label>
                <input type="number" id="topN" value="5" min="1" max="50" class="form-control" style="width:80px;">
                <button class="btn btn-success" onclick="filterCandidates()">Find Candidates</button>
            </div>
        </div>

        <!-- ✅ Results Table -->
        <div class="card p-3 mt-3">
            <h5>Top Candidates</h5>

            <table class="table table-bordered mt-2">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>File Name</th>
                    <th>Score</th>
                    <th>Download</th>
                </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </div>

    </div>
</div>

<div id="chatIcon" onclick="toggleChat()">💬</div>

<div id="chatContainer" class="card shadow">
    <div class="card-header bg-primary text-white d-flex justify-content-between">
        <span>AI Assistant</span>
        <button class="btn btn-sm btn-light" onclick="toggleChat()">X</button>
    </div>

    <div id="chatBox" class="p-3" style="height: 300px; overflow-y: auto;"></div>

    <div class="input-group p-2">
        <input type="text" id="userInput" class="form-control">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "/login";

        document.getElementById("userInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendMessage();
        });
    });

    function toggleChat() {
        const chat = document.getElementById("chatContainer");
        chat.style.display = (chat.style.display === "none" || chat.style.display === "") ? "block" : "none";
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");

        const message = input.value.trim();
        if (!message) return;

        chatBox.innerHTML += `<div><b>You:</b> ${message}</div>`;
        input.value = "";

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify({ message })
            });

            const data = await res.text();
            chatBox.innerHTML += `<div class="text-success"><b>AI:</b> ${data}</div>`;
        } catch {
            chatBox.innerHTML += `<div class="text-danger">Error</div>`;
        }
    }

    /* ✅ upload */
    async function uploadFiles() {
        const files = document.getElementById("files").files;

        if (files.length === 0) {
            alert("Select files first");
            return;
        }

        const formData = new FormData();
        for (let f of files) {
            formData.append("files", f);
        }

        try {
            const res = await fetch("/upload", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: formData
            });

            if (res.status === 401) {
                localStorage.removeItem("token");
                window.location.href = "/login";
            }

            alert("Upload success");
        } catch {
            alert("Upload failed");
        }
    }

    /* ✅ filter + render table with download option + dynamic top N */
    async function filterCandidates() {
        const jd = document.getElementById("jd").value;
        const topN = parseInt(document.getElementById("topN").value) || 5;

        if (!jd.trim()) {
            alert("Enter job description");
            return;
        }

        const tbody = document.getElementById("resultsBody");

        tbody.innerHTML = `
            <tr>
                <td colspan="4" class="text-center">🔄 Processing... please wait</td>
            </tr>
        `;

        try {
            const res = await fetch("/filter", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify({ jd, topN })
            });

            if (res.status === 401) {
                localStorage.removeItem("token");
                window.location.href = "/login";
                return;
            }

            const text = await res.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch (err) {
                console.error("Invalid JSON response:", text);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="text-danger text-center">❌ Server returned invalid response</td>
                    </tr>
                `;
                return;
            }

            if (!data || !data.candidates || data.candidates.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="text-center">No candidates found</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = "";
            let index = 1;

            data.candidates.forEach(c => {
                const score = isNaN(c.score) ? 0 : c.score;
                const color = score > 0.8 ? "table-success" :
                              score > 0.6 ? "table-warning" : "table-danger";

                const downloadBtn = c.downloadUrl
                    ? `<a href="${c.downloadUrl}" class="btn btn-sm btn-primary" target="_blank">Download</a>`
                    : "N/A";

                const row = `
                    <tr class="${color}">
                        <td>${index++}</td>
                        <td>${c.fileName || "N/A"}</td>
                        <td>${(score * 100).toFixed(2)}%</td>
                        <td>${downloadBtn}</td>
                    </tr>
                `;

                tbody.innerHTML += row;
            });

        } catch (e) {
            console.error("Filter error:", e);
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="text-danger text-center">❌ Failed to fetch results</td>
                </tr>
            `;
        }
    }
</script>

</body>
</html>
