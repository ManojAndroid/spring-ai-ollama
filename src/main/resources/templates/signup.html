<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;

            /* HR portal background image */
            background: url('https://images.unsplash.com/photo-1581091215364-5e4d0f3010bb?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.5); /* dark overlay */
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-bottom: 30px; color: #333; }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #6a11cb; }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #2575fc 0%, #6a11cb 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        p { margin-top: 15px; font-size: 14px; }
        p a { color: #6a11cb; text-decoration: none; font-weight: 500; }

        #message { color: green; font-size: 14px; margin-top: 10px; }
        #error { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Signup</h2>

    <form id="signupForm">
        <input type="text" id="username" placeholder="Username" required/>
        <input type="password" id="password" placeholder="Password" required/>
        <button type="submit">Signup</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
    <p id="message"></p>
    <p id="error"></p>
</div>

<script>
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) throw new Error();

            document.getElementById("message").innerText = "Signup successful! Redirecting to login...";
            setTimeout(() => { window.location.href = "/login"; }, 1500);
        } catch (err) {
            document.getElementById("error").innerText = "Signup failed";
        }
    });
</script>

</body>
</html>
