spring.application.name=spring-ai-ollama

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=codellama:latest
spring.ai.ollama.chat.options.temperature=0.7
#  default is true
spring.ai.chat.memory.enabled=true
spring.ai.model.chat=ollama


spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.model.embedding=ollama

spring.datasource.url=jdbc:mysql://localhost:3306/spring_ai_hr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

